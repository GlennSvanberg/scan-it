name: Release desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows NSIS + exe)
        working-directory: apps/desktop
        run: npx tauri build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_PAIRING_ORIGIN: ${{ vars.VITE_PAIRING_ORIGIN }}

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $exe = "apps/desktop/src-tauri/target/release/scan-it.exe"
          if (-not (Test-Path $exe)) { throw "scan-it.exe not found at $exe" }
          Compress-Archive -LiteralPath $exe -DestinationPath "scan-it-windows-portable.zip" -Force
          $nsis = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) { throw "NSIS setup.exe not found under bundle/nsis" }
          Copy-Item -LiteralPath $nsis.FullName -Destination "scan-it-windows-setup.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            scan-it-windows-portable.zip
            scan-it-windows-setup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Warn when macOS signing is not configured
        if: ${{ secrets.APPLE_SIGNING_IDENTITY == '' || secrets.APPLE_CERTIFICATE == '' || secrets.APPLE_CERTIFICATE_PASSWORD == '' || secrets.APPLE_ID == '' || secrets.APPLE_PASSWORD == '' || secrets.APPLE_TEAM_ID == '' }}
        run: echo "::warning::macOS signing/notarization secrets are not fully configured. Resulting DMG may be blocked by Gatekeeper."

      - name: Build Tauri (macOS universal DMG)
        working-directory: apps/desktop
        run: npx tauri build --target universal-apple-darwin
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_PAIRING_ORIGIN: ${{ vars.VITE_PAIRING_ORIGIN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Stage macOS DMG
        run: |
          set -euo pipefail
          DMG=$(ls apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG in universal-apple-darwin path; trying native target dir"
            DMG=$(ls apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          fi
          if [ -z "$DMG" ]; then
            echo "DMG not found"
            find apps/desktop/src-tauri/target -name "*.dmg" -maxdepth 6 2>/dev/null || true
            exit 1
          fi
          cp "$DMG" scan-it-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: scan-it-macos.dmg

  release:
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-assets
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scan-it-windows-portable.zip
            dist/scan-it-windows-setup.exe
            dist/scan-it-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
