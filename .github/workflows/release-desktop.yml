name: Release desktop (Windows portable)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Vite embed)
        working-directory: apps/desktop
        run: npx tauri build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_PAIRING_ORIGIN: ${{ vars.VITE_PAIRING_ORIGIN }}

      - name: Zip portable executable
        shell: pwsh
        run: |
          $exe = "apps/desktop/src-tauri/target/release/desktop.exe"
          if (-not (Test-Path $exe)) { throw "desktop.exe not found at $exe" }
          Compress-Archive -LiteralPath $exe -DestinationPath "scan-it-windows-portable.zip" -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scan-it-windows-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
